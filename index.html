<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LyricSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--border:#2a2a40;
  --accent:#e8ff00;--accent2:#ff4d6d;--text:#e8e8f0;--muted:#5a5a7a;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* HEADER */
#header{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#logo{font-family:'Bebas Neue',cursive;font-size:19px;color:var(--accent);letter-spacing:3px;flex-shrink:0;}
#audio-label{flex:1;font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);padding:6px 8px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;text-align:center;}
#audio-label.loaded{color:var(--accent);border-color:var(--accent);}
input[type=file]{display:none;}
#settings-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 10px;font-size:14px;cursor:pointer;flex-shrink:0;}
#settings-btn.active{border-color:var(--accent);color:var(--accent);}

/* SETTINGS DRAWER */
#settings-drawer{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;flex-shrink:0;overflow-y:auto;max-height:55vh;}
#settings-drawer.open{display:block;}
.sg{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.sg:last-child{margin-bottom:0;}
.sg-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:56px;flex-shrink:0;}
.chips{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 9px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;}
.chip:active{transform:scale(.95);}
.chip.on{background:rgba(232,255,0,.1);border-color:var(--accent);color:var(--accent);}
.chip.on2{background:rgba(255,77,109,.1);border-color:var(--accent2);color:var(--accent2);}

/* ASPECT RATIO CHIPS — visual */
.ar-chip{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  padding:4px 6px;font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;
  letter-spacing:1px;transition:all .15s;display:flex;flex-direction:column;
  align-items:center;gap:3px;min-width:48px;
}
.ar-chip:active{transform:scale(.95);}
.ar-chip.on{border-color:var(--accent);color:var(--accent);background:rgba(232,255,0,.08);}
.ar-icon{background:var(--border);display:block;}
.ar-chip.on .ar-icon{background:var(--accent);}
.ar-label{font-size:8px;text-align:center;}

/* BG / BLUR / DIM */
#bg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.sg-label2{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:56px;flex-shrink:0;}
#bg-file-label{background:var(--surface2);border:1px solid var(--accent2);color:var(--accent2);padding:4px 10px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;white-space:nowrap;}
#bg-clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 8px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;}
#bg-name{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;}
#bg-name.loaded{color:var(--accent2);}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.slider-row label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:56px;flex-shrink:0;}
.slider-row input[type=range]{flex:1;height:4px;cursor:pointer;}
#blur-slider{accent-color:var(--accent);}
#dim-slider{accent-color:var(--accent2);}
.slider-val{font-size:10px;min-width:30px;text-align:right;}
#blur-val{color:var(--accent);}#dim-val{color:var(--accent2);}

/* PREVIEW */
#preview-wrap{flex-shrink:0;position:relative;background:#111;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#preview-inner{position:relative;flex-shrink:0;}
#render-canvas{display:block;}
#bg-video-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;pointer-events:none;}
#rec-dot{display:none;position:absolute;top:8px;right:10px;background:rgba(200,0,0,.9);color:#fff;font-size:10px;padding:3px 8px;letter-spacing:2px;pointer-events:none;}
#rec-dot.on{display:block;}
#no-audio-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.88);z-index:5;}
#no-audio-overlay.hidden{display:none;}
#no-audio-overlay h2{font-family:'Bebas Neue';font-size:22px;color:var(--muted);letter-spacing:3px;}
#no-audio-overlay p{color:var(--muted);font-size:11px;}

/* AR label overlay */
#ar-label-overlay{position:absolute;bottom:6px;left:8px;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;pointer-events:none;}

/* WAVEFORM */
#wave-wrap{flex-shrink:0;height:44px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;cursor:pointer;overflow:hidden;}
#wave-canvas{width:100%;height:100%;display:block;}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);pointer-events:none;}
.wm{position:absolute;top:0;bottom:0;width:1px;background:var(--accent2);opacity:.7;pointer-events:none;}

/* CONTROLS */
#controls{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#play-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#play-btn svg{width:14px;height:14px;fill:#000;}
#time-disp{font-size:11px;color:var(--accent);min-width:90px;font-variant-numeric:tabular-nums;}
#sync-btn{flex:1;height:40px;background:var(--accent2);border:none;color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}
#rec-btn{height:40px;padding:0 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0;}
#rec-btn.recording{background:#c00;border-color:#c00;color:#fff;animation:rpulse 1s ease-in-out infinite;}
@keyframes rpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,.5);}50%{box-shadow:0 0 0 6px rgba(255,0,0,0);}}

#list-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex-shrink:0;}
#add-btn{background:var(--accent);color:#000;border:none;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:1px;}
#lyrics-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#lyrics-scroll::-webkit-scrollbar{width:3px;}
#lyrics-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.li{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;min-height:48px;}
.li:active{background:var(--surface2);}
.li.active{background:rgba(232,255,0,.06);border-left:2px solid var(--accent);}
.li.synced{border-left:2px solid var(--accent2);}
.li.active.synced{border-left:2px solid var(--accent);}
.lt{font-size:10px;color:var(--accent2);min-width:46px;font-variant-numeric:tabular-nums;flex-shrink:0;}
.lt.u{color:var(--muted);}
.ltext{flex:1;font-size:13px;line-height:1.3;}
.ldel{background:none;border:none;color:var(--muted);font-size:18px;padding:0 4px;cursor:pointer;flex-shrink:0;}

.panel{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.85);align-items:flex-end;}
.panel.open{display:flex;}
.panel-box{width:100%;background:var(--surface);border-top:1px solid var(--border);padding:16px;padding-bottom:calc(16px + var(--safe-b));}
.panel-box h3{font-family:'Bebas Neue';font-size:20px;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}
.panel-box p{color:var(--muted);font-size:11px;line-height:1.5;margin-bottom:12px;}
#add-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;font-family:'Space Mono',monospace;font-size:13px;resize:none;height:120px;outline:none;margin-bottom:10px;}
#add-textarea:focus{border-color:var(--accent);}
.row-btns{display:flex;gap:8px;}
.row-btns button{flex:1;height:44px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;border:none;cursor:pointer;letter-spacing:1px;}
.btn-confirm{background:var(--accent);color:#000;}
.btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
#exp-progress{height:3px;background:var(--border);margin-bottom:12px;}
#exp-bar{height:100%;background:var(--accent);width:0%;transition:width .15s;}
.exp-btns{display:flex;flex-direction:column;gap:8px;}
.exp-btns button{height:48px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
#exp-mp4{background:#ff8800;color:#000;font-weight:700;}
#exp-video{background:var(--accent2);color:#fff;}
#exp-srt{background:var(--accent);color:#000;}
#exp-json{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
#exp-close{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
#exp-status{margin-top:8px;font-size:11px;color:var(--accent2);min-height:14px;}
#conv-progress{height:3px;background:var(--border);margin-top:8px;display:none;}
#conv-bar{height:100%;background:var(--accent2);width:0%;transition:width .3s;}
#fname-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:'Space Mono',monospace;font-size:12px;outline:none;margin-bottom:10px;}
#fname-input:focus{border-color:var(--accent);}
#bottom-bar{display:flex;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-b);}
#exp-open-btn{flex:1;height:44px;background:var(--surface2);border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="logo">LYRICSYNC</span>
    <input type="file" id="audio-input" accept="audio/*">
    <label id="audio-label" for="audio-input">+ Audio</label>
    <button id="settings-btn" onclick="toggleSettings()">⚙</button>
  </div>

  <div id="settings-drawer">
    <!-- ASPECT RATIO -->
    <div class="sg">
      <span class="sg-label">FORMAT</span>
      <div class="chips" id="chips-ar"></div>
    </div>
    <!-- BG -->
    <div id="bg-row">
      <span class="sg-label2">FONS</span>
      <input type="file" id="bg-file-input" accept="image/*,video/*">
      <label id="bg-file-label" for="bg-file-input">+ Bilde/Video</label>
      <span id="bg-name">nav</span>
      <button id="bg-clear-btn" onclick="clearBg()">✕</button>
    </div>
    <div class="slider-row">
      <label for="blur-slider">BLUR</label>
      <input type="range" id="blur-slider" min="0" max="30" value="8" oninput="bgBlur=+this.value;document.getElementById('blur-val').textContent=this.value+'px'">
      <span class="slider-val" id="blur-val">8px</span>
    </div>
    <div class="slider-row">
      <label for="dim-slider">TUMŠĀK</label>
      <input type="range" id="dim-slider" min="0" max="90" value="40" oninput="bgDim=this.value/100;document.getElementById('dim-val').textContent=this.value+'%'">
      <span class="slider-val" id="dim-val">40%</span>
    </div>
    <!-- STYLE / FONT / CASE / ANIM / FX -->
    <div class="sg"><span class="sg-label">STILS</span><div class="chips" id="chips-style"></div></div>
    <div class="sg"><span class="sg-label">FONTS</span><div class="chips" id="chips-font"></div></div>
    <div class="sg"><span class="sg-label">BURTU</span><div class="chips" id="chips-case"></div></div>
    <div class="sg"><span class="sg-label">ANIMĀC.</span><div class="chips" id="chips-anim"></div></div>
    <div class="sg"><span class="sg-label">EFEKTI</span><div class="chips" id="chips-fx"></div></div>
    <div class="sg"><span class="sg-label">VIZUAL.</span><div class="chips" id="chips-viz"></div></div>
    <div class="slider-row">
      <label for="viz-opacity-slider">SPILGT.</label>
      <input type="range" id="viz-opacity-slider" min="5" max="100" value="40" oninput="cfg.vizOpacity=this.value/100;document.getElementById('viz-op-val').textContent=this.value+'%'">
      <span class="slider-val" id="viz-op-val">40%</span>
    </div>
    <div class="sg" style="margin-top:4px">
      <span class="sg-label">MĀKSL.</span>
      <input type="text" id="artist-input" placeholder="MonoLg" value="MonoLg" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:'Space Mono',monospace;font-size:11px;outline:none;" oninput="cfg.artistName=this.value">
    </div>
    <div class="sg">
      <span class="sg-label">DZIESMA</span>
      <input type="text" id="song-input" placeholder="Dziesmas nosaukums" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:'Space Mono',monospace;font-size:11px;outline:none;" oninput="cfg.songName=this.value">
    </div>
  </div>

  <div id="preview-wrap">
    <div id="preview-inner">
      <canvas id="render-canvas"></canvas>
      <video id="bg-video-el" loop muted playsinline></video>
      <div id="rec-dot">● REC</div>
      <div id="ar-label-overlay"></div>
      <div id="no-audio-overlay">
        <h2>Nav audio</h2>
        <p>Nospied "+ Audio"</p>
      </div>
    </div>
  </div>

  <div id="wave-wrap" ontouchstart="touchSeek(event)" ontouchmove="touchSeek(event)" onclick="clickSeek(event)">
    <canvas id="wave-canvas"></canvas>
    <div id="playhead" style="left:0%"></div>
  </div>

  <div id="controls">
    <button id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <span id="time-disp">0:00.0 / 0:00</span>
    <button id="sync-btn" onclick="syncCurrent()">⚡ SYNC</button>
    <button id="rec-btn" onclick="toggleRecord()">⏺ REC</button>
  </div>

  <div id="list-header">
    <span>Teksta rindas</span>
    <button id="add-btn" onclick="openAdd()">+ Pievienot</button>
  </div>
  <div id="lyrics-scroll"></div>
  <div id="bottom-bar">
    <button id="exp-open-btn" onclick="openExp()">⬇ Eksportēt</button>
  </div>
</div>

<div class="panel" id="add-panel" onclick="closeAdd()">
  <div class="panel-box" onclick="event.stopPropagation()">
    <h3>Pievienot rindas</h3>
    <textarea id="add-textarea" placeholder="Katra rinda = jauns bloks&#10;Var ielīmēt visu tekstu uzreiz"></textarea>
    <div class="row-btns">
      <button class="btn-confirm" onclick="confirmAdd()">+ Pievienot</button>
      <button class="btn-cancel" onclick="closeAdd()">Atcelt</button>
    </div>
  </div>
</div>

<div class="panel" id="exp-panel" onclick="closeExp()">
  <div class="panel-box" onclick="event.stopPropagation()">
    <h3>Eksportēt</h3>
    <p id="exp-desc">Ievadi faila nosaukumu un izvēlies formātu.</p>
    <input type="text" id="fname-input" placeholder="faila-nosaukums" value="monolg-lyrics">
    <div id="exp-progress"><div id="exp-bar"></div></div>
    <div class="exp-btns">
      <button id="exp-mp4" onclick="startMP4Render()">⏺ Renderēt MP4 video</button>
      <button id="exp-video" onclick="startVideoRender()">⏺ Renderēt WebM (ātrāk)</button>
      <button id="exp-srt" onclick="exportSRT()">⬇ SRT subtitri</button>
      <button id="exp-json" onclick="exportJSON()">⬇ JSON</button>
      <button id="exp-close" onclick="closeExp()">Aizvērt</button>
    </div>
    <div id="conv-progress"><div id="conv-bar"></div></div>
    <div id="exp-status"></div>
  </div>
</div>

<script>
// ── STATE ──
var lyrics=[], selectedId=null, audio=null;
var isPlaying=false, animFrame=null, currentDisplayedId=null, _id=0;
function genId(){return ++_id;}

var rc=null, rctx=null;
var textAnim={text:'',opacity:0,y:0,tOp:0,tY:0,phase:0};
var particles=[], sparkles=[];
var mediaRecorder=null, recordedChunks=[], isRecording=false, audioCtxRec=null;
var bgImage=null, bgVideoEl=null, bgIsVideo=false, bgBlur=8, bgDim=0.40;

// ── ASPECT RATIOS ──
var AR_PRESETS=[
  {key:'16:9', label:'16:9', sub:'YouTube', w:1280, h:720},
  {key:'9:16', label:'9:16', sub:'Shorts', w:720, h:1280},
  {key:'1:1',  label:'1:1',  sub:'Instagram', w:1080, h:1080},
  {key:'4:3',  label:'4:3',  sub:'Classic', w:1280, h:960},
  {key:'4:5',  label:'4:5',  sub:'IG Post', w:1080, h:1350},
];
var currentAR=AR_PRESETS[0];

function setAR(key){
  currentAR=AR_PRESETS.find(function(a){return a.key===key;})||AR_PRESETS[0];
  buildARChips();
  resizePreview();
  document.getElementById('ar-label-overlay').textContent=currentAR.label+' • '+currentAR.sub;
}

function buildARChips(){
  var el=document.getElementById('chips-ar'); el.innerHTML='';
  // icon dimensions scaled to ~28px height
  AR_PRESETS.forEach(function(ar){
    var btn=document.createElement('button');
    btn.className='ar-chip'+(ar.key===currentAR.key?' on':'');
    // icon box
    var maxDim=22;
    var iw,ih;
    if(ar.w>=ar.h){iw=maxDim;ih=Math.round(maxDim*ar.h/ar.w);}
    else{ih=maxDim;iw=Math.round(maxDim*ar.w/ar.h);}
    btn.innerHTML='<span class="ar-icon" style="width:'+iw+'px;height:'+ih+'px;border-radius:1px;"></span><span class="ar-label">'+ar.label+'<br>'+ar.sub+'</span>';
    btn.onclick=function(){setAR(ar.key);};
    el.appendChild(btn);
  });
}

// ── PREVIEW RESIZE ──
function resizePreview(){
  var wrap=document.getElementById('preview-wrap');
  var wrapW=wrap.offsetWidth;
  var wrapH=wrap.offsetHeight;
  var ar=currentAR.w/currentAR.h;
  var w,h;
  // fit inside wrap maintaining AR
  if(wrapW/wrapH>ar){h=wrapH;w=Math.round(h*ar);}
  else{w=wrapW;h=Math.round(w/ar);}
  var inner=document.getElementById('preview-inner');
  inner.style.width=w+'px';
  inner.style.height=h+'px';
  rc.width=w; rc.height=h;
  rc.style.width=w+'px'; rc.style.height=h+'px';
  particles=[];sparkles=[];
}

// ── SETTINGS ──
var cfg={style:'bebas-dark',font:'bebas',caseMode:'none',anim:'fade',sparkles:false,particles:true,viz:'bars',vizOpacity:0.4,artistName:'MonoLg',songName:''};
var styleOpts=[['bebas-dark','DARK'],['minimal-white','WHITE'],['neon-glow','NEON'],['retro-vhs','VHS']];
var fontOpts=[['bebas','BEBAS'],['mono','MONO'],['serif','SERIF'],['script','SCRIPT'],['oswald','OSWALD']];
var caseOpts=[['upper','AA'],['lower','aa'],['title','Aa'],['none','as-is']];
var animOpts=[['fade','FADE'],['slideup','SLIDE'],['zoom','ZOOM'],['typewriter','TYPE'],['glitch','GLITCH']];

function buildChips(){
  buildARChips();
  buildGroup('chips-style',styleOpts,'style');
  buildGroup('chips-font',fontOpts,'font');
  buildGroup('chips-case',caseOpts,'caseMode');
  buildGroup('chips-anim',animOpts,'anim');
  buildFxChips();
  buildVizChips();
}
function buildVizChips(){
  var el=document.getElementById('chips-viz');el.innerHTML='';
  [['bars','BARS'],['wave','WAVE'],['circle','CIRCLE'],['none','OFF']].forEach(function(o){
    var b=document.createElement('button');
    b.className='chip'+(cfg.viz===o[0]?' on':'');
    b.textContent=o[1];
    b.onclick=function(){cfg.viz=o[0];buildVizChips();};
    el.appendChild(b);
  });
}
function buildGroup(elId,opts,key){
  var el=document.getElementById(elId);el.innerHTML='';
  opts.forEach(function(o){
    var b=document.createElement('button');

var fontMap={
  'bebas':{family:"'Bebas Neue',cursive",weight:'normal'},
  'mono':{family:"'Space Mono',monospace",weight:'700'},
  'serif':{family:"'Playfair Display',serif",weight:'700'},
  'script':{family:"'Dancing Script',cursive",weight:'700'},
  'oswald':{family:"'Oswald',sans-serif",weight:'700'}

function applyCase(t){
  if(cfg.caseMode==='upper')return t.toUpperCase();
  if(cfg.caseMode==='lower')return t.toLowerCase();
  if(cfg.caseMode==='title')return t.replace(/\b\w/g,function(c){return c.toUpperCase();});
  return t;
}
// Bebas Neue is all-caps — auto-switch to Oswald for lower/title/none
function getEffectiveFont(){
  var f=cfg.font;
  if(f==='bebas'&&cfg.caseMode!=='upper') return fontMap['oswald'];
  return fontMap[f]||fontMap['bebas'];
}
var SC={
  'bebas-dark':{bg:function(c,w,h){if(bgImage||bgIsVideo)return;var g=c.createRadialGradient(w*.3,h*.5,0,w*.5,h*.5,Math.max(w,h)*.8);g.addColorStop(0,'#1a0030');g.addColorStop(1,'#000');c.fillStyle=g;c.fillRect(0,0,w,h);},color:'#fff',shadow:'rgba(232,255,0,.5)',sub:'#5a5a7a',pc:'#e8ff00'},
  'minimal-white':{bg:function(c,w,h){if(bgImage||bgIsVideo)return;c.fillStyle='#f5f5f0';c.fillRect(0,0,w,h);},color:'#111',shadow:null,sub:'#aaa',pc:'#333'},
  'neon-glow':{bg:function(c,w,h){if(bgImage||bgIsVideo)return;var g=c.createLinearGradient(0,0,w,h);g.addColorStop(0,'#000428');g.addColorStop(1,'#004e92');c.fillStyle=g;c.fillRect(0,0,w,h);},color:'#00ffff',shadow:'rgba(0,255,255,.8)',sub:'#004455',pc:'#00ffff'},
  'retro-vhs':{bg:function(c,w,h){if(bgImage||bgIsVideo)return;c.fillStyle='#1a0a2e';c.fillRect(0,0,w,h);},color:'#ff6ec7',shadow:null,sub:'#440033',pc:'#ff6ec7',chroma:true}
};

// ── PARTICLES / SPARKLES ──
function initPts(w,h){particles=[];for(var i=0;i<16;i++)particles.push({x:Math.random()*w,y:Math.random()*h,vy:-(0.3+Math.random()*.5),vx:(Math.random()-.5)*.3,r:.5+Math.random()*1.5,a:Math.random()*.4});}
function spawnSparkles(w,h){for(var i=0;i<6;i++)sparkles.push({x:w*.15+Math.random()*w*.7,y:h*.15+Math.random()*h*.7,vx:(Math.random()-.5)*2,vy:-(1+Math.random()*2),life:1,decay:.02+Math.random()*.02,size:2+Math.random()*3,rot:Math.random()*Math.PI*2,color:['#e8ff00','#ff4d6d','#00ffff','#fff','#ffaa00'][Math.floor(Math.random()*5)]});}
function drawStar(ctx,x,y,r,rot,alpha,color){ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();for(var i=0;i<5;i++){var a=i*Math.PI*.4-Math.PI/2,a2=a+Math.PI*.2;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.lineTo(Math.cos(a2)*r*.4,Math.sin(a2)*r*.4);}ctx.closePath();ctx.fillStyle=color;ctx.fill();ctx.restore();}

function drawBg(W,H){
  var s=SC[cfg.style];
  if(bgIsVideo&&bgVideoEl&&bgVideoEl.readyState>=2){
    rctx.save();if(bgBlur>0)rctx.filter='blur('+bgBlur+'px)';
    var vr=bgVideoEl.videoWidth/bgVideoEl.videoHeight,pr=W/H;
    var sw,sh,sx,sy;
    if(pr>vr){sw=W;sh=W/vr;sx=0;sy=(H-sh)/2;}else{sh=H;sw=H*vr;sx=(W-sw)/2;sy=0;}
    rctx.drawImage(bgVideoEl,sx,sy,sw,sh);
    rctx.filter='none';rctx.fillStyle='rgba(0,0,0,'+bgDim+')';rctx.fillRect(0,0,W,H);
    rctx.restore();
  } else if(bgImage&&bgImage.complete){
    rctx.save();if(bgBlur>0)rctx.filter='blur('+bgBlur+'px)';
    var iw=bgImage.naturalWidth,ih=bgImage.naturalHeight;
    var scale=Math.max(W/iw,H/ih);
    var sw2=iw*scale,sh2=ih*scale,sx2=(W-sw2)/2,sy2=(H-sh2)/2;
    rctx.drawImage(bgImage,sx2,sy2,sw2,sh2);
    rctx.filter='none';rctx.fillStyle='rgba(0,0,0,'+bgDim+')';rctx.fillRect(0,0,W,H);
    rctx.restore();
  } else {
    s.bg(rctx,W,H);
  }
}

// ── TYPEWRITER ──
var twState={displayed:'',target:'',pos:0};var twInterval=null;
function startTypewriter(text){
  if(twInterval)clearInterval(twInterval);
  twState.target=applyCase(text);twState.displayed='';twState.pos=0;
  twInterval=setInterval(function(){if(twState.pos>=twState.target.length){clearInterval(twInterval);return;}twState.pos++;twState.displayed=twState.target.substring(0,twState.pos);},38);
}

// ── AUDIO ANALYSER ──
var analyserCtx=null, analyser=null, analyserSrc=null, freqData=null;
function setupAnalyser(){
  if(!audio)return;
  try{
    if(analyserCtx)analyserCtx.close();
    analyserCtx=new AudioContext();
    analyser=analyserCtx.createAnalyser();
    analyser.fftSize=128;
    analyser.smoothingTimeConstant=0.8;
    freqData=new Uint8Array(analyser.frequencyBinCount);
    analyserSrc=analyserCtx.createMediaElementSource(audio);
    analyserSrc.connect(analyser);
    analyser.connect(analyserCtx.destination);
  }catch(e){analyser=null;}
}
function getFreqData(){
  if(!analyser||!audio||audio.paused)return null;
  if(analyserCtx&&analyserCtx.state==='suspended')analyserCtx.resume();
  analyser.getByteFrequencyData(freqData);
  return freqData;
}

// ── RENDER LOOP ──
function loop(){
  requestAnimationFrame(loop);
  if(!rc||!rctx)return;
  var W=rc.width,H=rc.height,s=SC[cfg.style];
  drawBg(W,H);
  if(cfg.particles){
    if(!particles.length)initPts(W,H);
    var pc=s.pc||'#e8ff00';
    for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;if(p.y<-4){p.y=H+2;p.x=Math.random()*W;}rctx.beginPath();rctx.arc(p.x,p.y,p.r,0,Math.PI*2);rctx.fillStyle=pc+Math.floor(p.a*255).toString(16).padStart(2,'0');rctx.fill();}
  }
  if(cfg.sparkles){
    for(var si=sparkles.length-1;si>=0;si--){var sp=sparkles[si];sp.x+=sp.vx;sp.y+=sp.vy;sp.life-=sp.decay;sp.rot+=.1;if(sp.life<=0){sparkles.splice(si,1);continue;}drawStar(rctx,sp.x,sp.y,sp.size,sp.rot,sp.life,sp.color);}
    if(textAnim.opacity>0.5&&Math.random()<0.12)spawnSparkles(W,H);
  }
  textAnim.opacity+=(textAnim.tOp-textAnim.opacity)*.1;
  textAnim.y+=(textAnim.tY-textAnim.y)*.1;
  textAnim.phase=(textAnim.phase||0)+0.05;
  if(textAnim.opacity>0.01&&textAnim.text){
    var fm=getEffectiveFont();
    var fs=Math.min(W*.1,H*.14,80);
    var displayText=applyCase(textAnim.text);
    rctx.save();rctx.textAlign='center';
    if(s.shadow){rctx.shadowColor=s.shadow;rctx.shadowBlur=24;}
    if(s.chroma){rctx.font=fm.weight+' '+fs+'px '+fm.family;rctx.fillStyle='#00ffff';rctx.globalAlpha=textAnim.opacity*.7;rctx.fillText(displayText,W/2-2,H/2+textAnim.y-2);rctx.fillStyle='#ffff00';rctx.fillText(displayText,W/2+2,H/2+textAnim.y+2);}
    rctx.font=fm.weight+' '+fs+'px '+fm.family;rctx.fillStyle=s.color;
    var op=textAnim.opacity,yOff=textAnim.y;
    if(cfg.anim==='fade'){rctx.globalAlpha=op;}
    else if(cfg.anim==='slideup'){rctx.globalAlpha=op;yOff+=(1-op)*40;}
    else if(cfg.anim==='zoom'){var sc=0.7+op*0.3;rctx.globalAlpha=op;rctx.translate(W/2,H/2+yOff);rctx.scale(sc,sc);rctx.translate(-W/2,-(H/2+yOff));}
    else if(cfg.anim==='glitch'){rctx.globalAlpha=op*.4;rctx.fillStyle='#ff0044';rctx.fillText(displayText,W/2+Math.sin(textAnim.phase*3.7)*4,H/2+yOff-2);rctx.fillStyle='#00ffff';rctx.fillText(displayText,W/2-Math.sin(textAnim.phase*2.3)*4,H/2+yOff+2);rctx.globalAlpha=op;rctx.fillStyle=s.color;}
    else if(cfg.anim==='typewriter'){rctx.globalAlpha=op;}
    rctx.shadowBlur=s.shadow?24:0;rctx.shadowColor=s.shadow||'transparent';
    rctx.font=fm.weight+' '+fs+'px '+fm.family;
    var txt=cfg.anim==='typewriter'?twState.displayed:displayText;
    var words=txt.split(' '),lines=[],line='',mw=W*.84;
    for(var wi=0;wi<words.length;wi++){var t2=line?line+' '+words[wi]:words[wi];if(rctx.measureText(t2).width>mw&&line){lines.push(line);line=words[wi];}else line=t2;}
    if(line)lines.push(line);
    var lh=fs*1.18,th=lines.length*lh;
    for(var li=0;li<lines.length;li++)rctx.fillText(lines[li],W/2,H/2+yOff-th/2+li*lh+lh/2);
    rctx.shadowBlur=0;
    // Artist name
    if(cfg.artistName){
      rctx.font='bold 11px Space Mono,monospace';rctx.fillStyle=s.sub;rctx.globalAlpha=op*.55;
      rctx.fillText(cfg.artistName.toUpperCase(),W/2,H/2+yOff+th/2+20);
    }
    // Song name below artist
    if(cfg.songName){
      rctx.font='10px Space Mono,monospace';rctx.fillStyle=s.sub;rctx.globalAlpha=op*.4;
      rctx.fillText(cfg.songName,W/2,H/2+yOff+th/2+36);
    }
    rctx.restore();
  }
  // ── VISUALIZER ──
  if(cfg.viz!=='none'){
    var fd=getFreqData();
    if(fd){
      var vOp=cfg.vizOpacity||0.4;
      var vc=s.pc||'#e8ff00';
      rctx.save();rctx.globalAlpha=vOp;
      if(cfg.viz==='bars'){
        var bCount=48,bW=W/bCount*.6,gap=W/bCount*.4;
        for(var bi=0;bi<bCount;bi++){
          var val=fd[Math.floor(bi*fd.length/bCount)]/255;
          var bH=val*H*0.35;
          var bx=bi*(bW+gap)+(gap/2);
          var by=H-bH;
          var alpha=0.4+val*0.6;
          rctx.fillStyle=vc;rctx.globalAlpha=vOp*alpha;
          rctx.fillRect(bx,by,bW,bH);
          // mirror top
          rctx.globalAlpha=vOp*alpha*0.3;
          rctx.fillRect(bx,0,bW,bH*0.3);
        }
      } else if(cfg.viz==='wave'){
        rctx.strokeStyle=vc;rctx.lineWidth=2;rctx.beginPath();
        for(var wi2=0;wi2<fd.length;wi2++){
          var wx=wi2/fd.length*W;
          var wy=H*0.85-(fd[wi2]/255)*H*0.3;
          if(wi2===0)rctx.moveTo(wx,wy);else rctx.lineTo(wx,wy);
        }
        rctx.stroke();
      } else if(cfg.viz==='circle'){
        var cx2=W/2,cy2=H/2,rBase=Math.min(W,H)*0.25;
        rctx.strokeStyle=vc;rctx.lineWidth=2;
        for(var ci=0;ci<fd.length;ci++){
          var angle=ci/fd.length*Math.PI*2-Math.PI/2;
          var r1=rBase,r2=rBase+(fd[ci]/255)*Math.min(W,H)*0.18;
          rctx.beginPath();
          rctx.moveTo(cx2+Math.cos(angle)*r1,cy2+Math.sin(angle)*r1);
          rctx.lineTo(cx2+Math.cos(angle)*r2,cy2+Math.sin(angle)*r2);
          rctx.globalAlpha=vOp*(0.3+fd[ci]/255*0.7);
          rctx.stroke();
        }
      }
      rctx.restore();
    }
  }
  // REC indicator only on preview (HTML overlay), not on canvas
}

// ── WAVEFORM ──
async function drawWave(file){
  var ac=new AudioContext(),buf=await file.arrayBuffer(),dec=await ac.decodeAudioData(buf),data=dec.getChannelData(0);
  var cv=document.getElementById('wave-canvas'),ctx=cv.getContext('2d');
  cv.width=cv.offsetWidth*devicePixelRatio;cv.height=cv.offsetHeight*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  var W=cv.offsetWidth,H=cv.offsetHeight,step=Math.ceil(data.length/W);
  ctx.clearRect(0,0,W,H);
  for(var i=0;i<W;i++){var mx=0;for(var j=0;j<step;j++){var v=Math.abs(data[i*step+j]||0);if(v>mx)mx=v;}var h=mx*H*.88,y=(H-h)/2;ctx.fillStyle='rgba(232,255,0,'+(0.2+mx*.8)+')';ctx.fillRect(i,y,1,h);}
  ac.close();drawMarkers();
}
function drawMarkers(){
  var c=document.getElementById('wave-wrap');c.querySelectorAll('.wm').forEach(function(e){e.remove();});
  if(!audio||!audio.duration)return;
  lyrics.forEach(function(l){if(l.startTime!==null){var m=document.createElement('div');m.className='wm';m.style.left=(l.startTime/audio.duration*100)+'%';c.appendChild(m);}});
}

function selLyric(id){

function delLyric(id,e){

function syncCurrent(){
  if(!audio||selectedId===null)return;
  var idx=lyrics.findIndex(function(l){return l.id===selectedId;});if(idx===-1)return;
  var now=audio.currentTime;lyrics[idx].startTime=now;
  if(idx>0&&lyrics[idx-1].endTime===null&&lyrics[idx-1].startTime!==null)lyrics[idx-1].endTime=now;
  if(idx+1<lyrics.length)selectedId=lyrics[idx+1].id;

  setTimeout(function(){var el=document.querySelector('.li[data-id="'+selectedId+'"]');if(el)el.scrollIntoView({block:'nearest'});},40);
}
document.addEventListener('keydown',function(e){if(e.code==='Space'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='INPUT'){e.preventDefault();if(!isPlaying&&audio)togglePlay();syncCurrent();}});

function showCurrent(){
  if(!audio)return;
  var t=audio.currentTime,cur=null;
  for(var i=lyrics.length-1;i>=0;i--){var l=lyrics[i];if(l.startTime!==null&&t>=l.startTime&&(l.endTime===null||t<=l.endTime)){cur=l;break;}}
  if(!cur){if(currentDisplayedId!==null){currentDisplayedId=null;textAnim.tOp=0;textAnim.tY=-15;}return;}
  if(cur.id!==currentDisplayedId){
    currentDisplayedId=cur.id;
    textAnim.opacity=0;textAnim.y=18;textAnim.text=cur.text;textAnim.tOp=1;textAnim.tY=0;
    if(cfg.anim==='typewriter')startTypewriter(cur.text);

    var el2=document.querySelector('.li[data-id="'+cur.id+'"]');if(el2)el2.scrollIntoView({block:'nearest'});
  }
}

// ── RECORD ──
// For render we use an offscreen canvas at full resolution
function toggleRecord(){if(isRecording)stopRecord();else startRec();}
function startRec(){
  if(!audio){alert('Ielādē audio!');return;}
  if(!lyrics.filter(function(l){return l.startTime!==null;}).length){alert('Nav sinhronizētu rindu!');return;}

  // Create offscreen canvas at full export resolution
  var exportW=currentAR.w, exportH=currentAR.h;
  var offscreen=document.createElement('canvas');
  offscreen.width=exportW; offscreen.height=exportH;
  var offCtx=offscreen.getContext('2d');

  audio.currentTime=0;recordedChunks=[];
  var cs=offscreen.captureStream(30);
  // Reuse analyserCtx if available to avoid MediaElementSource conflict
  if(audioCtxRec)try{audioCtxRec.close();}catch(e){}
  if(analyserCtx&&analyserSrc){
    // Already connected via analyser — tap from analyser output for recording
    audioCtxRec=analyserCtx;
    var dst=audioCtxRec.createMediaStreamDestination();
    analyser.connect(dst);
    var src=null; // already connected
  } else {
    audioCtxRec=new AudioContext();
    var dst=audioCtxRec.createMediaStreamDestination();
    var src=audioCtxRec.createMediaElementSource(audio);
    src.connect(dst);src.connect(audioCtxRec.destination);
  }
  var ms=new MediaStream(cs.getVideoTracks().concat(dst.stream.getAudioTracks()));
  var mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(function(m){return MediaRecorder.isTypeSupported(m);})||'video/webm';
  mediaRecorder=new MediaRecorder(ms,{mimeType:mime,videoBitsPerSecond:6000000});
  mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)recordedChunks.push(e.data);};
  mediaRecorder.onstop=function(){
    var blob=new Blob(recordedChunks,{type:mime});
    try{audioCtxRec.close();}catch(e){}
    offRenderActive=false;
    if(pendingMp4){
      pendingMp4=false;
      convertToMp4(blob);
    } else {
      var fn=getFileName()+'-'+currentAR.key.replace(':','x')+'.webm';
      dlBlob(fn,blob);
      setExpStatus('Saglabats: '+fn);
    }
  };

  // Mirror render loop onto offscreen canvas
  offRenderActive=true;
  (function offLoop(){
    if(!offRenderActive)return;
    requestAnimationFrame(offLoop);
    // scale from preview canvas
    offCtx.drawImage(rc,0,0,exportW,exportH);
  })();

  mediaRecorder.start(200);isRecording=true;
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-btn').textContent='⏹ STOP';
  document.getElementById('rec-btn').classList.add('recording');
  if(bgIsVideo&&bgVideoEl)bgVideoEl.currentTime=0;
  audio.play();isPlaying=true;updatePlayBtn();tick();
}
var offRenderActive=false;
function stopRecord(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  isRecording=false;offRenderActive=false;
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-btn').textContent='⏺ REC';
  document.getElementById('rec-btn').classList.remove('recording');
}

// ── EXPORT ──
var pendingMp4=false;
var ffmpegReady=false, ffmpegLoading=false, ffmpegInst=null;

function getFileName(){
  var v=document.getElementById('fname-input').value.trim();
  return v||'monolg-lyrics';
}

function openExp(){
  document.getElementById('exp-desc').textContent='Format: '+currentAR.label+' ('+currentAR.w+'x'+currentAR.h+') — '+currentAR.sub;
  document.getElementById('exp-panel').classList.add('open');
}
function closeExp(){document.getElementById('exp-panel').classList.remove('open');}
function setExpStatus(m){document.getElementById('exp-status').textContent=m;}
function setConvProgress(p){
  var bar=document.getElementById('conv-progress');
  var fill=document.getElementById('conv-bar');
  bar.style.display=p>0?'block':'none';
  fill.style.width=p+'%';
}

// Load FFmpeg lazily
async function loadFFmpeg(){
  if(ffmpegReady)return ffmpegInst;
  if(ffmpegLoading)return null;
  ffmpegLoading=true;
  setExpStatus('Ielādē FFmpeg (~30MB)...');
  try{
    var FFmpeg=window.FFmpeg||window.FFmpegWASM;
    // @ffmpeg/ffmpeg@0.12 UMD exports as FFmpegWASM
    var mod=window.FFmpegWASM||window.FFmpeg;
    ffmpegInst=new mod.FFmpeg();
    ffmpegInst.on('progress',function(e){
      var pct=Math.round((e.progress||0)*100);
      setConvProgress(pct);
      setExpStatus('Konvertē MP4... '+pct+'%');
    });
    await ffmpegInst.load({
      coreURL:'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
      wasmURL:'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
    });
    ffmpegReady=true;
    setExpStatus('FFmpeg gatavs!');
    return ffmpegInst;
  }catch(err){
    ffmpegLoading=false;
    setExpStatus('FFmpeg kļūda: '+err.message);
    return null;
  }
}

async function convertToMp4(webmBlob){
  setConvProgress(0);
  setExpStatus('Ielādē FFmpeg...');
  var ff=await loadFFmpeg();
  if(!ff){setExpStatus('FFmpeg neizdevās ielādēt. Saglabāts WebM.');dlBlob(getFileName()+'.webm',webmBlob);return;}
  try{
    setExpStatus('Sagatavo konversiju...');
    var arrBuf=await webmBlob.arrayBuffer();
    await ff.writeFile('input.webm',new Uint8Array(arrBuf));
    setExpStatus('Konvertē MP4...');
    await ff.exec(['-i','input.webm','-c:v','libx264','-preset','ultrafast','-crf','28','-c:a','aac','-movflags','+faststart','output.mp4']);
    var data=await ff.readFile('output.mp4');
    var mp4Blob=new Blob([data.buffer],{type:'video/mp4'});
    var fn=getFileName()+'-'+currentAR.key.replace(':','x')+'.mp4';
    dlBlob(fn,mp4Blob);
    setConvProgress(100);
    setExpStatus('Saglabats: '+fn+' ('+Math.round(mp4Blob.size/1024/1024*10)/10+'MB)');
    await ff.deleteFile('input.webm');
    await ff.deleteFile('output.mp4');
  }catch(err){
    setExpStatus('Konversijas kļūda: '+err.message);
    dlBlob(getFileName()+'.webm',webmBlob);
  }
}

function startMP4Render(){
  if(!audio){alert('Ielādē audio!');return;}
  if(!lyrics.filter(function(l){return l.startTime!==null;}).length){alert('Nav sinhronizetu rindu!');return;}
  pendingMp4=true;
  closeExp();
  setExpStatus('Ieraksta video...');
  startRec();
  audio.addEventListener('ended',function(){if(isRecording)stopRecord();},{once:true});
}

function startVideoRender(){
  if(!audio){alert('Ielādē audio!');return;}
  if(!lyrics.filter(function(l){return l.startTime!==null;}).length){alert('Nav sinhronizetu rindu!');return;}
  pendingMp4=false;
  closeExp();setExpStatus('Ieraksta WebM...');startRec();
  audio.addEventListener('ended',function(){if(isRecording)stopRecord();},{once:true});
}
function exportSRT(){
  var sy=lyrics.filter(function(l){return l.startTime!==null;});if(!sy.length){alert('Nav!');return;}
  var srt='';sy.forEach(function(l,i){var s=l.startTime,e=l.endTime||(sy[i+1]?sy[i+1].startTime:null)||(s+3);srt+=(i+1)+'\n'+st(s)+' --> '+st(e)+'\n'+l.text+'\n\n';});
  var fn=getFileName()+'.srt';
  animBar(function(){dlBlob(fn,new Blob([srt],{type:'text/plain'}));});
}
function exportJSON(){
  var fn=getFileName()+'.json';
  animBar(function(){dlBlob(fn,new Blob([JSON.stringify({lyrics:lyrics,ar:currentAR.key},null,2)],{type:'application/json'}));});
}
function animBar(cb){var b=document.getElementById('exp-bar'),p=0;var iv=setInterval(function(){p+=10;b.style.width=p+'%';if(p>=100){clearInterval(iv);cb();}},40);}
function st(s){return Math.floor(s/3600).toString().padStart(2,'0')+':'+Math.floor((s%3600)/60).toString().padStart(2,'0')+':'+Math.floor(s%60).toString().padStart(2,'0')+','+Math.floor((s%1)*1000).toString().padStart(3,'0');}
function dlBlob(n,b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

initCanvas();
buildChips();
['Ieraksti dziesmas tekstu','Vai ielimej visas rindas uzreiz','Sinhronizie ar audio','Spied SYNC rindu pa rindai','Tad REC VIDEO'].forEach(function(t){lyrics.push({id:genId(),text:t,startTime:null,endTime:null});});
renderList();
textAnim.text='LYRICSYNC';textAnim.tOp=0.2;
